spring:
  application:
    name: worker-service
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

flowforge:
  worker:
    worker-name: flowforge-worker
    heartbeat-interval-ms: 5000
    lease-duration-ms: 15000
    recovery-interval-ms: 10000
    enabled: true
    api-service-url: http://localhost:8080
    internal-token: default-internal-token-secret-key-12345
