spring:
  application:
    name: result-processor
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

flowforge:
  security:
    internal-token: default-internal-token-secret-key-12345
  result:
    api-service-url: http://localhost:8080
    topic-execution-completed: execution-completed
    group-id: result-processor-group
